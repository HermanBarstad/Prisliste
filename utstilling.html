<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#070707">
  <title>Utstilling 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #070707;
      --surface:  #0d0d0d;
      --text:     #cdc8bf;
      --dim:      #4e4a45;
      --accent:   #b5a482;
      --rule:     #181818;
    }

    html {
      background: var(--bg);
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      padding-bottom: max(3rem, env(safe-area-inset-bottom));
    }

    /* ── Works list ─────────────────────────────── */
    #works {
      padding: 0;
    }

    .work {
      padding: clamp(2.5rem, 8vw, 4rem) clamp(1.25rem, 5vw, 2rem);
      border-bottom: 1px solid var(--rule);
      max-width: 660px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(28px);
      transition:
        opacity  0.9s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .work.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Work number */
    .num {
      font-family: 'Space Mono', monospace;
      font-size: 0.53rem;
      letter-spacing: 0.28em;
      color: var(--dim);
      margin-bottom: 1.4rem;
      user-select: none;
    }

    /* ── Slideshow ──────────────────────────────── */
    .slideshow {
      display: grid;           /* stack both images in same cell */
      background: var(--surface);
      overflow: hidden;
    }

    .slide {
      grid-area: 1 / 1;
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .slide.active { opacity: 1; }

    /* ── Dots ───────────────────────────────────── */
    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 1rem 0 0;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.5s ease, transform 0.4s ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* ── Work info ──────────────────────────────── */
    .info { margin-top: 1.6rem; }

    .title {
      font-family: 'Barlow Condensed', 'Arial Black', Arial, sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: clamp(2rem, 8vw, 2.8rem);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1.05;
    }

    .meta {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(1.65rem, 6.75vw, 2rem);
      letter-spacing: 0.05em;
      color: #ffffff;
      text-transform: uppercase;
      margin-top: 1rem;
      line-height: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 0 0;
    }

    .meta-item::after {
      content: '·';
      margin: 0 0.55em;
      opacity: 0.3;
    }

    .meta-item:last-child::after { content: none; }

    .price {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(1.65rem, 6.75vw, 2rem);
      letter-spacing: 0.05em;
      color: #ffffff;
      margin-top: 0.9rem;
    }

    /* ── Footer ─────────────────────────────────── */
    footer {
      max-width: 660px;
      margin: 0 auto;
      padding: clamp(2.5rem, 8vw, 4rem) clamp(1.25rem, 5vw, 2rem);
      text-align: center;
    }

    footer p {
      font-family: 'Space Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 2.2;
    }
  </style>
</head>
<body>

<main id="works"></main>

<footer>
  <p>Alle priser inkl. mva.</p>
</footer>

<script>
  const WORKS = [
    { title: "Aldri mørkt",               type: "Original",    year: 2026, size: "160×160 cm", price: "12 500 kr" },
    { title: "Vektløs",                    type: "Original",    year: 2026, size: "140×120 cm", price: "10 000 kr" },
    { title: "Havgap",                     type: "Print 9/10",  year: 2024, size: "70×50 cm",   price: "2 000 kr"  },
    { title: "Mini havgap",                type: "Original",    year: 2024, size: "30×40 cm",   price: "5 000 kr"  },
    { title: "Frykt",                      type: "Original",    year: 2026, size: "100×60 cm",  price: "3 000 kr"  },
    { title: "Tillit? Negativ",            type: "Print 1/10",  year: 2025, size: "58×83 cm",   price: "3 000 kr"  },
    { title: "Tillit?",                    type: "Original",    year: 2025, size: "40×50 cm",   price: "10 000 kr" },
    { title: "Ingen skygger",              type: "Print 1/10",  year: 2025, size: "60×60 cm",   price: "2 000 kr"  },
    { title: "Betongens utenforskap lll",  type: "Print 1/10",  year: 2024, size: "60×60 cm",   price: "2 000 kr"  },
    { title: "Betongens utenforskap ll",   type: "Print 2/10",  year: 2024, size: "60×60 cm",   price: "2 000 kr"  },
    { title: "Betongens utenforskap",      type: "Original",    year: 2024, size: "60×60 cm",   price: "15 000 kr" },
  ];

  const container = document.getElementById('works');

  WORKS.forEach((w, i) => {
    const n   = i + 1;
    const pad = String(n).padStart(2, '0');

    // Build images
    const imgA = document.createElement('img');
    imgA.src       = `bilder/${n}.jpg`;
    imgA.alt       = w.title;
    imgA.className = 'slide active';
    imgA.loading   = i < 2 ? 'eager' : 'lazy';

    const imgB = document.createElement('img');
    imgB.src       = `bilder/${n}x.jpg`;
    imgB.alt       = w.title;
    imgB.className = 'slide';
    imgB.loading   = 'lazy';

    // Slideshow container
    const ss = document.createElement('div');
    ss.className = 'slideshow';
    ss.append(imgA, imgB);

    // Dots
    const dotA = document.createElement('span');
    dotA.className = 'dot active';
    const dotB = document.createElement('span');
    dotB.className = 'dot';

    const dotsEl = document.createElement('div');
    dotsEl.className = 'dots';
    dotsEl.setAttribute('aria-hidden', 'true');
    dotsEl.append(dotA, dotB);

    // Info block
    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `
      <h2 class="title">${w.title}</h2>
      <p class="meta">
        <span class="meta-item">${w.type}</span>
        <span class="meta-item">${w.year}</span>
        <span class="meta-item">${w.size}</span>
      </p>
      <p class="price">${w.price}</p>
    `;

    // Number label
    const numEl = document.createElement('p');
    numEl.className = 'num';
    numEl.setAttribute('aria-label', `Verk ${n}`);
    numEl.textContent = `— ${pad} —`;

    // Article
    const article = document.createElement('article');
    article.className = 'work';
    article.append(numEl, ss, dotsEl, info);
    container.appendChild(article);

    // ── Slideshow timer ──────────────────────────
    const slides  = [imgA, imgB];
    const dotEls  = [dotA, dotB];
    let   current = 0;

    setInterval(() => {
      slides[current].classList.remove('active');
      dotEls[current].classList.remove('active');
      current = 1 - current;
      slides[current].classList.add('active');
      dotEls[current].classList.add('active');
    }, 5000);
  });

  // ── Fade-in observer ────────────────────────────
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.work').forEach(el => io.observe(el));
</script>

</body>
</html>
